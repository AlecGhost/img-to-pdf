name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: img-to-pdf
            asset_name: img-to-pdf-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: img-to-pdf.exe
            asset_name: img-to-pdf-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: img-to-pdf
            asset_name: img-to-pdf-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: img-to-pdf
            asset_name: img-to-pdf-macos-aarch64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build target
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Rename and prepare asset
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
